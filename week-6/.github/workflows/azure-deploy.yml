# ═══════════════════════════════════════════════════════════════════════
# Week 6 Day 2 – GitHub Actions CI/CD Pipeline
# Employee Management API → Azure App Service
# ═══════════════════════════════════════════════════════════════════════
#
# REQUIRED GITHUB SECRETS (Settings → Secrets → Actions):
#
#   AZURE_WEBAPP_NAME          → your App Service name   e.g. week6-employee-api
#   AZURE_WEBAPP_PUBLISH_PROFILE → download from Azure Portal → App Service
#                                  → Overview → Get publish profile
#   AZURE_CREDENTIALS          → output of: az ad sp create-for-rbac (see README)
#   SQL_CONNECTION_STRING      → Azure SQL connection string (for migrations)
#
# OPTIONAL (override appsettings if not using Key Vault):
#   JWT_SECRET_KEY             → JWT signing secret (32+ chars)
#   APP_INSIGHTS_CONNECTION    → Application Insights connection string
#
# ═══════════════════════════════════════════════════════════════════════

name: Employee Management API – CI/CD

on:
  push:
    branches:
      - main
      - week-6-azure-deployment
    paths:
      - 'week-6/src/**'
      - 'week-6/.github/workflows/**'
  pull_request:
    branches:
      - main
    paths:
      - 'week-6/src/**'
  workflow_dispatch:       # Allow manual trigger from GitHub UI

env:
  DOTNET_VERSION: '8.0.x'
  PROJECT_PATH: 'week-6/src/EmployeeService/EmployeeService.csproj'
  TEST_PROJECT_PATH: 'week-6/src/EmployeeService.Tests/EmployeeService.Tests.csproj'
  PUBLISH_DIR: 'publish-output'
  WORKING_DIR: 'week-6'

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Build & Test
  # ─────────────────────────────────────────────
  build-and-test:
    name: 🔨 Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout source code
        uses: actions/checkout@v4

      - name: ⚙️ Set up .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 📦 Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/week-6/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: 🔄 Restore NuGet packages
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: 🏗️ Build application
        run: |
          dotnet build ${{ env.PROJECT_PATH }} \
            --configuration Release \
            --no-restore \
            --verbosity minimal

      - name: 🧪 Run unit tests
        run: |
          if [ -f "${{ env.TEST_PROJECT_PATH }}" ]; then
            dotnet test ${{ env.TEST_PROJECT_PATH }} \
              --configuration Release \
              --no-build \
              --verbosity normal \
              --logger "trx;LogFileName=test-results.trx" \
              --collect:"XPlat Code Coverage"
          else
            echo "⚠️  Test project not found at ${{ env.TEST_PROJECT_PATH }}"
            echo "    Skipping tests. Create the test project to enable this step."
          fi

      - name: 📊 Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: '**/test-results.trx'
          retention-days: 7

      - name: 📤 Publish application
        run: |
          dotnet publish ${{ env.PROJECT_PATH }} \
            --configuration Release \
            --no-restore \
            --output ${{ env.PUBLISH_DIR }}

      - name: 📦 Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: published-app
          path: ${{ env.PUBLISH_DIR }}
          retention-days: 1

  # ─────────────────────────────────────────────
  # JOB 2: Deploy to Azure App Service
  # Only runs on push to main or week-6 branch (not PRs)
  # ─────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Azure
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    environment:
      name: production
      url: https://${{ secrets.AZURE_WEBAPP_NAME }}.azurewebsites.net

    steps:
      - name: 📥 Checkout source code
        uses: actions/checkout@v4

      - name: ⚙️ Set up .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 📥 Download published artifact
        uses: actions/download-artifact@v4
        with:
          name: published-app
          path: ${{ env.PUBLISH_DIR }}

      - name: 🔑 Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: 🗄️ Run EF Core migrations
        # Uses the SQL connection string from GitHub Secrets
        # In production, the app reads from Key Vault — this is only for migrations
        run: |
          dotnet tool install --global dotnet-ef --version 8.0.0 || true
          dotnet ef database update \
            --project ${{ env.PROJECT_PATH }} \
            --connection "${{ secrets.SQL_CONNECTION_STRING }}" \
            --no-build
        continue-on-error: true  # Don't fail deploy if DB is already up-to-date

      - name: 🌐 Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          package: ${{ env.PUBLISH_DIR }}

      - name: ✅ Verify deployment health
        run: |
          echo "Waiting 20s for app to start..."
          sleep 20
          APP_URL="https://${{ secrets.AZURE_WEBAPP_NAME }}.azurewebsites.net"
          
          # Check liveness endpoint
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${APP_URL}/health/live" || echo "000")
          echo "Health check HTTP status: ${HTTP_STATUS}"
          
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "✅ Deployment verified! API is healthy."
          else
            echo "⚠️  Health check returned ${HTTP_STATUS}. Check App Service logs."
            echo "   View logs: az webapp log tail --name ${{ secrets.AZURE_WEBAPP_NAME }} --resource-group Week6-EmployeeManagement-RG"
          fi

      - name: 🔒 Azure logout
        if: always()
        run: az logout

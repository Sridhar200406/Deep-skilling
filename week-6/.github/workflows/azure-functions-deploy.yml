# ═══════════════════════════════════════════════════════════════════════
# Week 6 Day 3 – GitHub Actions CI/CD for Azure Functions
# ═══════════════════════════════════════════════════════════════════════
#
# REQUIRED GITHUB SECRETS (Settings → Secrets → Actions):
#   AZURE_CREDENTIALS               → Service principal JSON (from Day 2)
#   AZURE_FUNCTIONAPP_NAME          → e.g. week6-employee-functions
#   AZURE_FUNCTIONAPP_PUBLISH_PROFILE → download from Azure Portal → Function App
#   SQL_CONNECTION_STRING           → Azure SQL (for any migration steps)
#
# ═══════════════════════════════════════════════════════════════════════

name: Azure Functions – CI/CD

on:
  push:
    branches:
      - main
      - week-6-azure-deployment
    paths:
      - 'week-6/src/AzureFunctions/**'
      - 'week-6/src/Shared/**'
      - 'week-6/.github/workflows/azure-functions-deploy.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'week-6/src/AzureFunctions/**'
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'
  FUNCTIONS_PROJECT: 'week-6/src/AzureFunctions/AzureFunctions.csproj'
  PUBLISH_DIR: 'functions-publish'

jobs:
  # ─── Job 1: Build Azure Functions ────────────────────────────────────
  build:
    name: 🔨 Build Azure Functions
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 📦 Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-functions-${{ hashFiles('**/AzureFunctions/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-functions-

      - name: 🔄 Restore
        run: dotnet restore ${{ env.FUNCTIONS_PROJECT }}

      - name: 🏗️ Build
        run: dotnet build ${{ env.FUNCTIONS_PROJECT }} --configuration Release --no-restore

      - name: 📤 Publish
        run: dotnet publish ${{ env.FUNCTIONS_PROJECT }} --configuration Release --no-restore --output ${{ env.PUBLISH_DIR }}

      - name: 📦 Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: functions-app
          path: ${{ env.PUBLISH_DIR }}
          retention-days: 1

  # ─── Job 2: Deploy to Azure Functions ────────────────────────────────
  deploy:
    name: 🚀 Deploy to Azure Functions
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    environment:
      name: production
      url: https://${{ secrets.AZURE_FUNCTIONAPP_NAME }}.azurewebsites.net

    steps:
      - name: 📥 Download artifact
        uses: actions/download-artifact@v4
        with:
          name: functions-app
          path: ${{ env.PUBLISH_DIR }}

      - name: 🔑 Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: 🌐 Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ secrets.AZURE_FUNCTIONAPP_NAME }}
          package: ${{ env.PUBLISH_DIR }}
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}

      - name: ✅ Verify health
        run: |
          echo "Waiting 20s for functions to start..."
          sleep 20
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://${{ secrets.AZURE_FUNCTIONAPP_NAME }}.azurewebsites.net/api/employee-notification/health")
          echo "Health status: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "✅ Functions are healthy!"
          else
            echo "⚠️  Status $STATUS — check logs"
          fi

      - name: 🔒 Azure logout
        if: always()
        run: az logout

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: employee-management-ingress
  namespace: employee-management
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  rules:
    - http:
        paths:
          - path: /api/employees
            pathType: Prefix
            backend:
              service:
                name: employee-service
                port:
                  number: 80
          - path: /api/auth
            pathType: Prefix
            backend:
              service:
                name: employee-service
                port:
                  number: 80
          - path: /api/departments
            pathType: Prefix
            backend:
              service:
                name: employee-service
                port:
                  number: 80
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: employee-service
                port:
                  number: 80
          - path: /swagger
            pathType: Prefix
            backend:
              service:
                name: employee-service
                port:
                  number: 80

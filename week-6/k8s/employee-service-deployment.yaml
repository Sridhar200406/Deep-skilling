apiVersion: apps/v1
kind: Deployment
metadata:
  name: employee-service
  namespace: employee-management
  labels:
    app: employee-service
    version: "1.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: employee-service
  template:
    metadata:
      labels:
        app: employee-service
    spec:
      containers:
        - name: employee-service
          image: week6employeeacr.azurecr.io/employee-service:latest
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: "Production"
            # Key Vault URI — non-secret, safe in ConfigMap/env
            - name: AzureKeyVault__VaultUri
              valueFrom:
                configMapKeyRef:
                  name: employee-service-config
                  key: KEYVAULT_URI
            - name: JwtSettings__Issuer
              value: "EmployeeManagementAPI"
            - name: JwtSettings__Audience
              value: "EmployeeManagementClient"
            - name: AzureBlobStorage__ContainerName
              value: "employee-files"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: employee-service
  namespace: employee-management
spec:
  selector:
    app: employee-service
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: ClusterIP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: employee-service-config
  namespace: employee-management
data:
  KEYVAULT_URI: "https://week6-emp-kv.vault.azure.net/"

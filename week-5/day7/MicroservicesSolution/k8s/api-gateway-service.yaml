apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: employee-mgmt
  labels:
    app: api-gateway
spec:
  selector:
    app: api-gateway
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000
      nodePort: 30000      # main entry point: http://localhost:30000
  type: NodePort

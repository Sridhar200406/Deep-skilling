apiVersion: v1
kind: Service
metadata:
  name: authentication-service
  namespace: employee-mgmt
  labels:
    app: authentication-service
spec:
  selector:
    app: authentication-service
  ports:
    - protocol: TCP
      port: 5001
      targetPort: 5001
      nodePort: 30001      # accessible at http://localhost:30001 via NodePort
  type: NodePort
